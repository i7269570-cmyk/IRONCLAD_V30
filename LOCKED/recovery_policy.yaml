# =============================================================================
# IRONCLAD_V31.1 - RECOVERY & STATE PROTECTION POLICY (Final)
# =============================================================================
# ROLE: TERMINATION, STATE PROTECTION & MANUAL RESTART POLICY
# PRINCIPLE: ANTI-LOOPING / ABSOLUTE STATE INTEGRITY
# =============================================================================

RECOVERY_POLICY:
  # [1] 상태 보호 명시 (State Protection)
  # 시스템에 의한 상태 자동 복구, 재구축, 초기화를 엄격히 금지함
  state_protection:
    allow_auto_recovery: false
    allow_state_rebuild: false
    allow_state_reset: false

  # [2] 시스템 중단 정책 명시 (Failure Policy)
  # 크리티컬 에러 발생 시 즉시 중단(HALT)하며, 자동 재시작 및 재시도를 허용하지 않음
  failure_policy:
    on_critical_error: "HALT"
    allow_restart: false
    allow_retry: false

  # [3] 수동 개입 명시 (Manual Intervention)
  # SAFE_HALT 이후 운영자의 수동 점검 및 물리적 개입을 강제함
  manual_intervention:
    required: true
    description: "SAFE_HALT 발생 시 시스템은 영구 정지되며, 반드시 관리자의 수동 점검 후 재시작해야 함"

# -----------------------------------------------------------------------------
# OPERATIONAL IMPACT:
# 1. ON ANY FAILURE -> IMMEDIATE TERMINATION (HALT)
# 2. STATE DATA -> NO AUTOMATIC MODIFICATION OR RESET
# 3. RECOVERY -> REQUIRES MANUAL AUDIT & HARD RESET
# -----------------------------------------------------------------------------