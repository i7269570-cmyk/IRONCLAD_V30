execution_constraints:
  slippage:
    order_max_slippage_pct: 0.003 # 0.3% 이상의 슬리피지 허용 안 함

  liquidity:
    # 🎯 잡주 차단 핵심: 거래대금 300억 미만 즉시 탈락
    min_value:0     
    # 평소보다 거래량이 1.5배 이상 터진 '수급주'만 선정
    min_volume_ratio: 0

  spread:
    # 호가창이 비어있는 종목 차단 (0.2% 이내만 허용)
    max_spread_pct: 1.0

  safety:
    # 중복 진입 엄격 금지 (청산 전까지 한 놈만 팬다)
    forbid_duplicate_position: true
    forbid_same_asset_group: true