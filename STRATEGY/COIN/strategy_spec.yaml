# ============================================================
# IRONCLAD_V31.30 - Strategy Specification (COIN SSOT)
# ============================================================

strategy_info:
  name: "IRONCLAD_MULTI_4_COIN"
  version: "1.0.2"

# 1. REGIME CONTROL (통합 관제 섹션)
regime:
  current_state: "NO_TRADE"

  evaluation_order:
    - TREND
    - RANGE
    - NO_TRADE

  global_filter:
    metric: "change_rate"
    threshold: -0.01

  conditions:
    TREND:
      all:
        - { field: "close", op: ">", ref: "ma200", multiplier: 1.0 }
        - { field: "ma20", op: ">", ref: "ma50", multiplier: 1.0 }
        - { field: "adx", op: ">", value: 25 }
    RANGE:
      all:
        - { field: "adx", op: "<", value: 20 }
        - { field: "atr_percent", op: "<", value: 1.5 }
        - { field: "disparity_abs", op: "<=", value: 0.005 }
    NO_TRADE:
      fallback: true

  persistence:
    TREND:
      min_hold_bars: 8
    RANGE:
      min_hold_bars: 6
    NO_TRADE:
      min_hold_bars: 4

  switch:
    TREND:
      strategy: "TURTLE"
      allow_entry: true
    RANGE:
      strategy: "DISPARITY"
      allow_entry: true
    NO_TRADE:
      strategy: "NONE"
      allow_entry: false

# 2. STRATEGY PRIVATE CONFIG (전략별 고유 설정)
strategies:
  TURTLE:
    strategy_id: "TURTLE"
    risk_per_trade: 0.01
    stop_distance: 2.0
  DISPARITY:
    strategy_id: "DISPARITY"
    risk_per_trade: 0.005
    stop_distance: 1.5