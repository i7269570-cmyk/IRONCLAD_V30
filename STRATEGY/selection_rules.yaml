# ============================================================
# IRONCLAD_V31.32 - High-End Selector Rules (Final)
# ============================================================

selector_rules:

  # [1] 데이터 소스 (반자동: Universe 파일 참조)
  source:
    type: "universe_file"
    stock: "UNIVERSE/stock_universe"
    crypto: "UNIVERSE/crypto_universe"

  # [2] 1차 필터 (유동성 & 변동성 기준 압축)
  filter:
    liquidity:
      field: "value"        # 거래대금 기준
      top_n: 30             # 상위 30개 후보군 선발
    
    volatility:
      field: "atr_percent"  # 변동성 기준
      top_n: 20             # 그중 변동성 상위 20개로 재압축

  # [3] 최종 랭킹 가중치 (Scoring Engine)
  ranking:
    - field: "value"        # 거래대금이 많을수록 가점
      order: "desc"         # 내림차순 정렬
      weight: 0.6           # 가중치 60%
    
    - field: "atr_percent"  # 변동성이 클수록 가점
      order: "desc"         # 내림차순 정렬
      weight: 0.4           # 가중치 40%

  # [4] 엔진 투입 수 (최정예 선발)
  selection:
    final_top_k: 10         # 최종 10개 종목만 분석 엔진으로 전달

  # [5] 시장 건전성 체크 (Majority Evaluation)
  market_check:
    enabled: true           # 활성화
    condition:
      # 전체 후보군 중 20일선 위에 있는 종목이 50% 이상일 때만 진입
      field: "close_above_ma20_ratio" 
      op: ">="              # 이상
      value: 0.5            # 50% 기준