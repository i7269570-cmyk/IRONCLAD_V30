# ============================================================
# IRONCLAD_V31.33 - High-End Selector Rules (Integrity Optimized)
# ============================================================

selector_rules:

  # [1] 데이터 소스 (반자동: Universe 파일 참조)
  source:
    type: "universe_file"
    stock: "UNIVERSE/stock_universe"
    crypto: "UNIVERSE/crypto_universe"

  # [2] 1차 필터 (유동성 & 변동성 기준 압축)
  filter:
    liquidity:
      field: "value"        # 거래대금 기준
      top_n: 30             # 상위 30개 후보군 선발
    
    volatility:
      field: "atr_percent"  # 변동성 기준
      top_n: 20             # 그중 변동성 상위 20개로 재압축

  # [3] 최종 랭킹 가중치 (Scoring Engine)
  ranking:
    - field: "value"        # 거래대금이 많을수록 가점
      order: "desc"         # 내림차순 정렬
      weight: 0.6           # 가중치 60%
    
    - field: "atr_percent"  # 변동성이 클수록 가점
      order: "desc"         # 내림차순 정렬
      weight: 0.4           # 가중치 40%

  # [4] 엔진 투입 수 (최종 선정 개수 - SSOT)
  selection:
    final_top_k: 5          # 전략 엔진으로 전달할 최종 종목 수 (유일 참조점)

  # [5] 유니버스 생성 규칙
  universe:
    metric: value
    top_n: 100

  # [6] 지표별 가중치 설정
  weights:
    rsi: 1.0
    value: 1.0