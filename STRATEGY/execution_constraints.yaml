execution_constraints:
  slippage:
    order_max_slippage_pct: 0.003

  latency:
    max_order_delay_ms: 500

  liquidity:
    # [수정] 최소 거래대금 기준 상향 조정 (300억) [cite: 2026-03-17]
    min_value: 30000000000        
    min_volume_ratio: 1.5

  spread:
    max_spread_pct: 0.002

  safety:
    forbid_duplicate_position: true
    forbid_same_asset_group: true