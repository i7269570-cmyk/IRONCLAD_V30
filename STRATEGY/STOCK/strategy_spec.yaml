# ============================================================
# IRONCLAD_V31.45 - Strategy Specification (Final Contract)
# ============================================================

strategy_info:
  name: "IRONCLAD_MULTI_4_STOCK"
  version: "1.0.4"

# 1. REGIME CONTROL (Full Open for Testing)
regime:
  current_state: "TREND"
  evaluation_order:
    - "TREND"

  # [수정] TEST 전략으로 고정
  switch:
    TREND:
      strategy: "TEST"
      allow_entry: true

  # [핵심] 관문 통과 조건 (항상 참)
  conditions:
    TREND:
      all:
        - { field: "close", op: ">=", ref: "low", multiplier: 1.0 }

  global_filter:
    metric: "change_rate"
    threshold: -0.99

  persistence:
    TREND:
      min_hold_bars: 1

# 2. STRATEGY DEFINITIONS
strategies:
  TEST:
    strategy_id: "TEST"
    risk_per_trade: 0.001
    stop_distance: 0.5
    
    # [ENTRY] 수정: >= 연산자를 사용하여 무조건 신호 생성 유도
    entry_conditions:
      all:
        - { field: "close", op: ">=", ref: "low", multiplier: 1.0 }

    # [EXIT] 수정: >= 연산자로 변경 (필요 시 조건을 상향하여 테스트 가능)
    exit_conditions:
      any:
        - { field: "close", op: ">=", ref: "high", multiplier: 1.0 }