version: 1

# =========================
# 1. 거래 스케줄
# =========================
schedule:
  trading_days: ["MON", "TUE", "WED", "THU"]
  trading_time:
    start: "09:00"
    end: "15:00"

# =========================
# 2. 강제 청산
# =========================
force_exit:
  enabled: true
  time: "15:20"

# =========================
# 3. 종목 선택 (항상 3개)
# =========================
selection:
  final_top_k: 3

# =========================
# 4. Regime 필터
# ma20 <= ma60: RANGE 구간 → 진입 허용
# ma20 > ma60: TREND 구간 → 진입 금지
# 검증 결과: RANGE PF 1.755 / TREND PF 0.51
# =========================
regime:
  filter: RANGE_ONLY
  condition:
    field: ma20
    op: "<="
    ref: ma60

# =========================
# 5. 진입 조건 (Disparity 평균회귀)
# =========================
entry:
  risk_per_trade: 0.01
  stop_distance: 0.01
  conditions:
    # ma20 대비 -4% 이상 하락
    - field: close
      op: "<"
      ref: ma20
      multiplier: 0.96

    # ma20 대비 -10% 이내
    - field: close
      op: ">"
      ref: ma20
      multiplier: 0.90

    # 거래량 급증
    - field: volume_ratio
      op: ">="
      value: 1.2

    # 당일 저가 대비 반등 확인
    - field: close
      op: ">"
      ref: low
      multiplier: 1.005

# =========================
# 6. 청산 조건
# =========================
exit:
  take_profit: 0.015
  stop_loss: 0.010
  max_hold_bars: 5
