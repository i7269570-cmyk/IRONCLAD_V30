# ============================================================
# IRONCLAD_V31.3 - Market Regime Rules (Logic Sync)
# ============================================================
# ROLE: MARKET ENTRY BLOCKER (Regime Filter Sync)
# PRINCIPLE: INDIVIDUAL EVALUATION / PASS ON THRESHOLD
# ============================================================

regime_rules:
  # [1] Evaluation Metric (String)
  # Evaluation field based on selector output (e.g., change_rate, value)
  metric: "change_rate"

  # [2] Entry Threshold (Number)
  # [Rule] PASS if ANY selected candidate's metric is GREATER THAN OR EQUAL TO this value.
  # Example: -0.01 means entry is ALLOWED if at least one candidate has change_rate >= -1%.
  threshold: -0.01

# ------------------------------------------------------------
# OPERATIONAL IMPACT:
# 1. Logic: Evaluate each candidate's 'metric' against 'threshold' independently.
# 2. Condition: If (Any candidate's metric >= threshold) -> ENTRY ALLOWED (PASS).
# 3. Restriction: Average-based filtering or multi-condition logic is strictly prohibited.
# ------------------------------------------------------------